<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Inn - Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            margin: 0;
            padding: 0;
        }

        .sidebar {
            width: 250px;
            background: #2c3e50;
            color: white;
            height: 100vh;
            position: fixed;
            padding-top: 20px;
            overflow-y: auto;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #18bc9c;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 16px;
            text-decoration: none;
            border-bottom: 1px solid #34495e;
            cursor: pointer;
        }

        .sidebar a:hover {
            background: #1a252f;
        }

        .content {
            margin-left: 250px;
            padding: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #f8f9fa;
        }

        button {
            background: #18bc9c;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #128f76;
        }

        input, textarea, select {
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        .form-group { margin-bottom: 15px; }

        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
    </style>
</head>

<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Admin Login</h2>
            <input type="email" id="email" placeholder="Admin Email">
            <input type="password" id="password" placeholder="Password">
            <button onclick="login()">Login</button>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" style="display:none;">
        <div class="sidebar">
            <h2>Garden Inn</h2>
            <a onclick="loadData('minibar_items', renderMinibar)">Minibar Items</a>
            <a onclick="loadData('services', renderServices)">Services</a>
            <a onclick="loadData('tours', renderTours)">Tours</a>
            <a onclick="loadData('rules', renderRules)">Rules</a>
            <a onclick="loadData('translations', renderTranslations)">Translations</a>
            <a onclick="loadData('housekeeping_requests', renderHousekeeping)">Housekeeping Logs</a>
            <a onclick="loadData('housekeeping_ratings', renderRatings)">Guest Ratings</a>
            <a onclick="logout()" style="color:#e74c3c;">Logout</a>
        </div>

        <div class="content">
            <h1>Admin Dashboard</h1>

            <!-- MINIBAR SECTION -->
            <div class="card" id="minibar-section">
                <h3>Add Minibar Item</h3>
                <div class="form-group">
                    <input type="text" id="mb-name" placeholder="Item Name">
                    <input type="number" id="mb-price" placeholder="Price (AMD)">
                    <p><small>Select Image File:</small></p>
                    <input type="file" id="mb-file">
                </div>
                <button onclick="addMinibarItem()">Add Item</button>
                <div id="minibar-table"></div>
            </div>

            <!-- SERVICES SECTION -->
            <div class="card" id="services-section" style="display:none;">
                <h3>Add Service</h3>
                <div class="form-group">
                    <input type="text" id="svc-key" placeholder="Key (e.g. pool)">
                    <input type="text" id="svc-title" placeholder="Title">
                    <textarea id="svc-desc" placeholder="Description (HTML allowed)"></textarea>
                    <select id="svc-type">
                        <option value="free">Free</option>
                        <option value="paid">Paid</option>
                    </select>
                    <input type="text" id="svc-icon" placeholder="Icon (e.g. 🏊)">
                    <p><small>Upload Main Image:</small></p>
                    <input type="file" id="svc-file">
                </div>
                <button onclick="addService()">Add Service</button>
                <div id="services-table"></div>
            </div>

            <!-- TOURS SECTION -->
            <div class="card" id="tours-section" style="display:none;">
                <h3>Add Tour</h3>
                <div class="form-group">
                    <input type="text" id="tour-key" placeholder="Key (e.g. sevan-trip)">
                    <input type="text" id="tour-title" placeholder="Title">
                    <textarea id="tour-desc" placeholder="Description (HTML allowed)"></textarea>
                    <input type="text" id="tour-price" placeholder="Price (e.g. 10,000 AMD)">
                    <input type="text" id="tour-icon" placeholder="Icon (e.g. ⛵)">
                    <p><small>Upload Main Image:</small></p>
                    <input type="file" id="tour-file">
                </div>
                <button onclick="addTour()">Add Tour</button>
                <div id="tours-table"></div>
            </div>

            <!-- RULES SECTION -->
            <div class="card" id="rules-section" style="display:none;">
                <h3>Add Rule</h3>
                <input type="text" id="rule-icon" placeholder="Icon (e.g. 🚭)">
                <input type="text" id="rule-text" placeholder="Rule Text">
                <button onclick="addRule()">Add Rule</button>
                <div id="rules-table"></div>
            </div>

            <!-- TRANSLATIONS SECTION -->
            <div class="card" id="translations-section" style="display:none;">
                <h3>Manage Translations</h3>
                <div class="form-group">
                    <input type="text" id="trans-key" placeholder="Text Key (e.g. welcome)">
                    <input type="text" id="trans-en" placeholder="English">
                    <input type="text" id="trans-ru" placeholder="Russian">
                    <input type="text" id="trans-hy" placeholder="Armenian">
                </div>
                <button onclick="addTranslation()">Save/Update Translation</button>
                <div id="translations-table"></div>
            </div>

            <!-- LOGS SECTIONS -->
            <div class="card" id="housekeeping-section" style="display:none;">
                <h3>Housekeeping Requests</h3>
                <div id="hk-table"></div>
            </div>

            <div class="card" id="ratings-section" style="display:none;">
                <h3>Guest Ratings</h3>
                <div id="ratings-table"></div>
            </div>
        </div>
    </div>

    <script src="admin-script.js?v=3"></script>
</body>

</html>
